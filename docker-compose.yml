services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seekr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-seekr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    image: seekr:local
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      SEEKR_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-seekr}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-seekr}
      SEEKR_CONFIG_PATH: /app/config/seekr.yaml
    volumes:
      - ./config:/app/config:ro
    command: ["/app/scripts/start.sh", "seekr", "serve"]
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock

volumes:
  pgdata:
