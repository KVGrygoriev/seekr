# Seekr configuration — copy to config/seekr.yaml and edit.
# Strings may use ${ENV_VAR} or ${ENV_VAR:-default} interpolation.

sources:
  olx:
    request_delay_ms: 1500
    max_pages: 5
    user_agent: "SeekrBot/0.1"
    timeout_seconds: 20.0

searches:
  - name: "Land — Sofiivska Borshchahivka"
    source: olx
    url: "https://www.olx.ua/uk/nedvizhimost/zemlya/prodazha-zemli/sofievskaya-borschagovka/"
    enabled: true

report:
  template: default
  group_by: [search, classification]
  order_by: [price_per_100m2_asc, posted_at_desc]
  include_classifications: [NEW, UPDATED_BY_OWNER, REPOSTED_BY_OTHER, PRICE_CHANGED]
  include_operator_notes: true

telegram:
  bot_token_env: TELEGRAM_BOT_TOKEN
  # If chat_ids is empty, TELEGRAM_CHAT_ID env var is used.
  chat_ids: []
  parse_mode: HTML
  disable_web_page_preview: true
  rate_limit_per_second: 20.0

schedule:
  mode: oneshot           # or "interval"
  interval_minutes: 60    # only used when mode=interval
